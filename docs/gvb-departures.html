<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GVB Veer" />
  <title>GVB Veer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #060C18; overscroll-behavior: none; }
    input, select { -webkit-appearance: none; }
    input::placeholder { color: rgba(107,130,168,0.5); }
    input:focus, select:focus { border-color: rgba(255,112,67,0.4) !important; outline: none; }
    [data-group-id][data-stop-over="true"]  { outline: 2px dashed rgba(99,179,237,0.6); border-radius: 16px; background: rgba(99,179,237,0.04); }
    [data-group-id][data-group-over="true"] { outline: 2px dashed rgba(255,112,67,0.6); border-radius: 16px; background: rgba(255,112,67,0.04); }
    .drag-ghost { position: fixed; pointer-events: none; z-index: 9999; opacity: 0.85; transform: scale(1.03) rotate(1deg); box-shadow: 0 12px 40px rgba(0,0,0,0.6); border-radius: 14px; transition: transform .1s; }
    .drag-handle { touch-action: none; cursor: grab; user-select: none; -webkit-user-select: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { h, render, Fragment } from 'https://esm.sh/preact@10';
import { useState, useEffect, useCallback, useRef } from 'https://esm.sh/preact@10/hooks';
import htm from 'https://esm.sh/htm@3';
const html = htm.bind(h);

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchDepartures(lineKey) {
  const target = encodeURIComponent(`http://v0.ovapi.nl/line/${lineKey}`);
  const sources = [
    `https://api.allorigins.win/raw?url=${target}`,
    `https://api.codetabs.com/v1/proxy?quest=${target}`,
  ];
  let json = null;
  for (const src of sources) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 7000);
      const r = await fetch(src, { signal: ctrl.signal }).finally(() => clearTimeout(tid));
      if (!r.ok) continue;
      json = await r.json();
      break;
    } catch { /* try next */ }
  }
  if (!json) throw new Error("All proxies failed");
  const actuals = (json[lineKey] || {}).Actuals || {};
  const now = new Date();
  return Object.values(actuals)
    .filter(p => p.ExpectedDepartureTime || p.TargetDepartureTime)
    .map(p => ({
      line:        p.LinePublicNumber || "?",
      destination: (p.DestinationName50 || "").trim(),
      stopName:    p.TimingPointName || "",
      expected:    new Date(p.ExpectedDepartureTime || p.TargetDepartureTime),
    }))
    .filter(p => p.expected > now)
    .sort((a, b) => a.expected - b.expected);
}

// ── Config ────────────────────────────────────────────────────────────────────
const DEFAULT_STOPS = [
  { id:"f3",  label:"Veer Buiksloterweg",  lineKey:"GVB_901_1", fromStop:"Buiksloterweg", line:"F3", towards:"Centraal"      },
  { id:"f2",  label:"Veer IJplein",         lineKey:"GVB_902_1", fromStop:"IJplein",        line:"F2", towards:"Centraal"      },
  { id:"f1a", label:"Veer Azartplein",      lineKey:"GVB_915_2", fromStop:"Azartplein",     line:"F1", towards:"Zamenhofstraat"},
  { id:"f1b", label:"Veer Zamenhofstraat",  lineKey:"GVB_915_1", fromStop:"Zamenhofstraat", line:"F1", towards:"Azartplein"    },
  { id:"f4",  label:"Veer NDSM",            lineKey:"GVB_906_1", fromStop:"NDSM",           line:"F4", towards:"Centraal"      },
  { id:"f7",  label:"Veer NDSM (F7)",       lineKey:"GVB_903_2", fromStop:"NDSM",           line:"F7", towards:"Pontsteiger"   },
  { id:"f6",  label:"Veer Distelweg",       lineKey:"GVB_900_1", fromStop:"Distelweg",      line:"F6", towards:"Pontsteiger"   },
];

const DEFAULT_GROUPS = [
  { id:"west",   label:"West",   stopIds:["f7","f6"]      },
  { id:"centrum",label:"Centrum",stopIds:["f2","f3","f4"] },
  { id:"oost",   label:"Oost",   stopIds:["f1a","f1b"]    },
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtCountdown(dt) {
  const d = Math.max(0, Math.floor((dt - new Date()) / 1000));
  if (d === 0) return "NOW";
  const m = Math.floor(d / 60), s = d % 60;
  if (m === 0) return `${s}s`;
  if (m < 60)  return `${m}:${String(s).padStart(2,"0")}`;
  return `${Math.floor(m/60)}h${String(m%60).padStart(2,"0")}`;
}
function fmtClock(dt) {
  return dt.toLocaleTimeString("nl-NL", { hour:"2-digit", minute:"2-digit" });
}
function urgencyColor(dt) {
  const mins = (dt - new Date()) / 60000;
  if (mins > 10) return "#00D462";
  if (mins > 8)  return "#F59E0B";
  return "#EF4444";
}
function urgencyGlow(dt) {
  const mins = (dt - new Date()) / 60000;
  if (mins > 10) return "rgba(0,212,98,.35)";
  if (mins > 8)  return "rgba(245,158,11,.35)";
  return "rgba(239,68,68,.35)";
}

// ── StopCard ──────────────────────────────────────────────────────────────────
function StopCard({ stop, onRemove, onEdit, canRemove, onNextDep }) {
  const [deps,  setDeps]  = useState([]);
  const [state, setState] = useState("loading");
  const [,      tick]     = useState(0);

  const load = useCallback(async () => {
    try {
      let all = await fetchDepartures(stop.lineKey);
      if (stop.fromStop) all = all.filter(p => p.stopName.toLowerCase().includes(stop.fromStop.toLowerCase()));
      const slice = all.slice(0, 4);
      setDeps(slice);
      setState(slice.length > 0 ? "live" : "empty");
      onNextDep(stop.id, slice[0]?.expected ?? null);
    } catch {
      if (deps.length === 0) {
        const now = Date.now();
        const demo = [
          { line:stop.line, destination:stop.towards, stopName:stop.fromStop, expected:new Date(now+6*60000+22000) },
          { line:stop.line, destination:stop.towards, stopName:stop.fromStop, expected:new Date(now+26*60000+22000) },
          { line:stop.line, destination:stop.towards, stopName:stop.fromStop, expected:new Date(now+46*60000+22000) },
        ];
        setDeps(demo);
        setState("demo");
        onNextDep(stop.id, demo[0].expected);
      }
    }
  }, [stop, deps.length]);

  useEffect(() => { load(); const t = setInterval(load, 30000); return () => clearInterval(t); }, [load]);
  useEffect(() => { const t = setInterval(() => tick(n => n+1), 1000); return () => clearInterval(t); }, []);

  const next  = deps[0];
  const color = next ? urgencyColor(next.expected) : "#4A6280";
  const glow  = next ? urgencyGlow(next.expected)  : "transparent";

  return html`
    <div
      data-drag-type="stop"
      data-drag-id=${stop.id}
      style=${{ background:"rgba(255,255,255,0.035)", borderRadius:"14px", border:"1px solid rgba(255,255,255,0.07)", borderLeft:`4px solid ${color}`, padding:"12px 14px 10px", position:"relative", overflow:"hidden", transition:"border-color .5s" }}
    >
      <div style=${{ position:"absolute", top:"-40px", left:"-20px", width:"120px", height:"120px", borderRadius:"50%", background:`${color}10`, filter:"blur(30px)", pointerEvents:"none" }}/>
      <div style=${{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px" }}>
        <span class="drag-handle" data-drag-handle="stop" style=${{ color:"#3D5070", fontSize:"18px", lineHeight:1, padding:"4px 2px" }}>⠿</span>
        <span style=${{ background:"#C8392B", color:"#fff", padding:"2px 7px", borderRadius:"5px", fontFamily:"'Share Tech Mono',monospace", fontSize:"12px", fontWeight:"700", letterSpacing:"1px" }}>${stop.line}</span>
        <span style=${{ flex:1, fontSize:"14px", fontWeight:"600", color:"#DEE6F5", fontFamily:"'Barlow Condensed',sans-serif", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>${stop.label}</span>
        ${stop.towards && html`<span style=${{ fontSize:"11px", color:"#4A6280", fontFamily:"'Barlow',sans-serif" }}>→ ${stop.towards}</span>`}
        ${state==="demo" && html`<span style=${{ background:"rgba(232,121,249,0.12)", color:"#E879F9", fontSize:"9px", padding:"2px 5px", borderRadius:"4px", letterSpacing:"1.5px" }}>DEMO</span>`}
        <button onPointerDown=${e => e.stopPropagation()} onClick=${() => onEdit(stop)}
          style=${{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:"16px", lineHeight:1, padding:"4px 4px", minWidth:"32px", minHeight:"32px" }}>✏️</button>
        ${canRemove && html`<button onPointerDown=${e => e.stopPropagation()} onClick=${() => onRemove(stop.id)}
          style=${{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:"20px", lineHeight:1, padding:"4px 4px", minWidth:"32px", minHeight:"32px" }}>×</button>`}
      </div>
      ${state==="loading" ? html`
        <div style=${{ color:"#263550", fontFamily:"'Barlow',sans-serif", padding:"4px 0" }}>Fetching…</div>
      ` : state==="empty" ? html`
        <div style=${{ color:"#4A6280", fontFamily:"'Barlow',sans-serif", fontSize:"13px", padding:"4px 0" }}>No upcoming departures</div>
      ` : next ? html`
        <${Fragment}>
          <div style=${{ display:"flex", alignItems:"flex-end", gap:"10px", marginBottom:"6px" }}>
            <span style=${{ fontFamily:"'Share Tech Mono',monospace", fontSize:"46px", lineHeight:1, letterSpacing:"-1px", color, textShadow:`0 0 20px ${glow}`, transition:"color .5s" }}>${fmtCountdown(next.expected)}</span>
            <span style=${{ fontSize:"11px", color:"#5A7099", fontFamily:"'Barlow',sans-serif", paddingBottom:"7px" }}>→ ${next.destination||stop.towards}</span>
          </div>
          ${deps.slice(1).length > 0 && html`
            <div style=${{ borderTop:"1px solid rgba(255,255,255,0.06)", paddingTop:"6px", display:"flex", gap:"12px" }}>
              ${deps.slice(1).map((d,i) => html`
                <div key=${i} style=${{ fontFamily:"'Share Tech Mono',monospace", fontSize:"15px", color:urgencyColor(d.expected), transition:"color .5s" }}>${fmtClock(d.expected)}</div>
              `)}
            </div>
          `}
        </${Fragment}>
      ` : null}
    </div>
  `;
}

// ── GroupSection ──────────────────────────────────────────────────────────────
function GroupSection({ group, stops, nextDeps, onRemoveStop, onEditStop, onNextDep, canRemove }) {
  const groupStops = group.stopIds
    .map(id => stops.find(s => s.id === id))
    .filter(Boolean)
    .sort((a, b) => {
      const ta = nextDeps[a.id], tb = nextDeps[b.id];
      if (!ta && !tb) return 0;
      if (!ta) return 1;
      if (!tb) return -1;
      return ta - tb;
    });

  return html`
    <div data-group-id=${group.id} style=${{ borderRadius:"16px", padding:"8px 8px 10px", border:"1px solid transparent", transition:"background .15s, outline .15s" }}>
      <div data-drag-type="group" class="drag-handle" style=${{ display:"flex", alignItems:"center", gap:"8px", padding:"2px 0 8px" }}>
        <span style=${{ color:"#3D5070", fontSize:"18px", lineHeight:1 }}>⠿</span>
        <span style=${{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:"700", fontSize:"13px", letterSpacing:"2.5px", color:"#4A6280", textTransform:"uppercase" }}>${group.label}</span>
        <div style=${{ flex:1, height:"1px", background:"rgba(255,255,255,0.06)" }}/>
      </div>
      <div style=${{ display:"flex", flexDirection:"column", gap:"8px" }}>
        ${groupStops.map(s => html`
          <${StopCard} key=${s.id} stop=${s}
            onRemove=${onRemoveStop}
            onEdit=${onEditStop}
            canRemove=${canRemove}
            onNextDep=${onNextDep} />
        `)}
        ${groupStops.length === 0 && html`
          <div style=${{ color:"#263550", fontFamily:"'Barlow',sans-serif", fontSize:"13px", padding:"8px 4px", textAlign:"center" }}>Drop a stop here</div>
        `}
      </div>
    </div>
  `;
}

// ── StopModal ─────────────────────────────────────────────────────────────────
function StopModal({ initial, groups, onSave, onClose }) {
  const isEdit = !!initial;
  const [f, setF] = useState(initial || { label:"", lineKey:"", fromStop:"", line:"", towards:"", groupId: groups[0]?.id || "" });
  const upd = k => e => setF(p => ({...p, [k]: e.target.value}));
  const ok = f.label && f.lineKey && f.line;
  const inp = { background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:"10px", color:"#DEE6F5", padding:"12px 14px", width:"100%", fontFamily:"'Barlow',sans-serif", fontSize:"16px", boxSizing:"border-box" };
  return html`
    <div style=${{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", display:"flex", alignItems:"flex-end", zIndex:100 }} onClick=${onClose}>
      <div style=${{ background:"#0D1525", borderRadius:"20px 20px 0 0", padding:"22px 18px 48px", width:"100%", maxWidth:"480px", margin:"0 auto", border:"1px solid rgba(255,255,255,0.08)", borderBottom:"none" }} onClick=${e=>e.stopPropagation()}>
        <h3 style=${{ margin:"0 0 14px", color:"#DEE6F5", fontFamily:"'Barlow Condensed',sans-serif", fontSize:"20px", fontWeight:"700" }}>${isEdit?"Edit stop":"Add a stop"}</h3>
        <div style=${{ display:"flex", flexDirection:"column", gap:"10px" }}>
          <input style=${inp} placeholder="Stop name (e.g. Veer NDSM)" value=${f.label} onInput=${upd("label")} />
          <div style=${{ display:"flex", gap:"8px" }}>
            <input style=${{...inp, flex:2}} placeholder="Line key (e.g. GVB_903_2)" value=${f.lineKey} onInput=${upd("lineKey")} />
            <input style=${{...inp, flex:1}} placeholder="Line (e.g. F7)" value=${f.line} onInput=${upd("line")} />
          </div>
          <div style=${{ display:"flex", gap:"8px" }}>
            <input style=${{...inp, flex:1}} placeholder="From stop" value=${f.fromStop} onInput=${upd("fromStop")} />
            <input style=${{...inp, flex:1}} placeholder="Towards" value=${f.towards} onInput=${upd("towards")} />
          </div>
          <select style=${{...inp, color: f.groupId ? "#DEE6F5" : "rgba(107,130,168,0.5)"}} value=${f.groupId||""} onChange=${upd("groupId")}>
            <option value="">No group</option>
            ${groups.map(g => html`<option key=${g.id} value=${g.id}>${g.label}</option>`)}
          </select>
          <div style=${{ display:"flex", gap:"10px", marginTop:"4px" }}>
            <button onClick=${onClose} style=${{ flex:1, background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.09)", borderRadius:"12px", color:"#6B82A8", fontFamily:"'Barlow Condensed',sans-serif", fontSize:"17px", fontWeight:"600", padding:"14px", cursor:"pointer" }}>Cancel</button>
            <button disabled=${!ok} onClick=${() => { onSave({...f, id:initial?.id||`s${Date.now()}`}); onClose(); }}
              style=${{ flex:2, background:ok?"#C8392B":"rgba(200,57,43,.2)", border:"none", borderRadius:"12px", color:ok?"#fff":"#5A3030", fontFamily:"'Barlow Condensed',sans-serif", fontSize:"17px", fontWeight:"700", padding:"14px", cursor:ok?"pointer":"default", transition:"all .2s" }}>
              ${isEdit?"Save":"Add Stop"}
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [stops,    setStops]    = useState(DEFAULT_STOPS);
  const [groups,   setGroups]   = useState(DEFAULT_GROUPS);
  const [nextDeps, setNextDeps] = useState({});
  const [modal,    setModal]    = useState(null);

  const handleNextDep = useCallback((id, time) => {
    setNextDeps(prev => ({ ...prev, [id]: time }));
  }, []);

  const handleSave = (stop) => {
    setStops(prev => prev.some(s => s.id === stop.id)
      ? prev.map(s => s.id === stop.id ? stop : s)
      : [...prev, stop]
    );
    if (stop.groupId) {
      setGroups(prev => prev.map(g => {
        const without = g.stopIds.filter(id => id !== stop.id);
        if (g.id === stop.groupId) return { ...g, stopIds: [...without, stop.id] };
        return { ...g, stopIds: without };
      }));
    }
  };

  const handleRemoveStop = (id) => {
    setStops(prev => prev.filter(s => s.id !== id));
    setGroups(prev => prev.map(g => ({ ...g, stopIds: g.stopIds.filter(sid => sid !== id) })));
  };

  // ── Touch drag-and-drop ───────────────────────────────────────────────────
  useEffect(() => {
    const THRESHOLD = 8;
    let pending = null;
    let active  = null;

    function getGroupEl(el) { return el?.closest('[data-group-id]'); }
    function groupIdAt(x, y, ghost) {
      if (ghost) ghost.style.visibility = 'hidden';
      const el = document.elementFromPoint(x, y);
      if (ghost) ghost.style.visibility = '';
      return getGroupEl(el)?.dataset.groupId || null;
    }
    function clearHighlights() {
      document.querySelectorAll('[data-group-id]').forEach(el => {
        el.removeAttribute('data-stop-over');
        el.removeAttribute('data-group-over');
      });
    }
    function setHighlight(groupId, type) {
      clearHighlights();
      if (!groupId) return;
      const el = document.querySelector(`[data-group-id="${groupId}"]`);
      if (el) el.setAttribute(type === 'stop' ? 'data-stop-over' : 'data-group-over', 'true');
    }

    function onTouchStart(e) {
      // Only initiate drag from dedicated handles
      const stopHandle  = e.target.closest('[data-drag-handle="stop"]');
      const groupHandle = e.target.closest('[data-drag-type="group"]');
      if (!stopHandle && !groupHandle) return;

      const touch = e.touches[0];
      if (stopHandle) {
        const stopEl    = stopHandle.closest('[data-drag-type="stop"]');
        const fromGroup = getGroupEl(stopEl)?.dataset.groupId;
        pending = { type:'stop', id:stopEl.dataset.dragId, fromGroup, el:stopEl, startX:touch.clientX, startY:touch.clientY };
      } else {
        const container = getGroupEl(groupHandle);
        pending = { type:'group', id:container?.dataset.groupId, fromGroup:null, el:container, startX:touch.clientX, startY:touch.clientY };
      }
    }

    function onTouchMove(e) {
      const touch = e.touches[0];
      if (active) {
        e.preventDefault();
        const { ghost, offsetX, offsetY, type } = active;
        ghost.style.left = `${touch.clientX - offsetX}px`;
        ghost.style.top  = `${touch.clientY - offsetY}px`;
        const hovered = groupIdAt(touch.clientX, touch.clientY, ghost);
        active.hoveredGroup = hovered;
        setHighlight(hovered, type);
      } else if (pending) {
        const dx = touch.clientX - pending.startX;
        const dy = touch.clientY - pending.startY;
        if (Math.sqrt(dx*dx + dy*dy) < THRESHOLD) return;
        e.preventDefault();
        const rect  = pending.el.getBoundingClientRect();
        const ghost = pending.el.cloneNode(true);
        ghost.className = 'drag-ghost';
        ghost.style.left  = `${rect.left}px`;
        ghost.style.top   = `${rect.top}px`;
        ghost.style.width = `${rect.width}px`;
        document.body.appendChild(ghost);
        active  = { ...pending, ghost, offsetX: touch.clientX - rect.left, offsetY: touch.clientY - rect.top, hoveredGroup: pending.fromGroup };
        pending = null;
      }
    }

    function onTouchEnd() {
      if (active) {
        const { type, id, fromGroup, hoveredGroup, ghost } = active;
        document.body.removeChild(ghost);
        clearHighlights();
        if (hoveredGroup && hoveredGroup !== fromGroup) {
          if (type === 'stop') {
            setGroups(prev => prev.map(g => {
              if (g.id === fromGroup)    return { ...g, stopIds: g.stopIds.filter(sid => sid !== id) };
              if (g.id === hoveredGroup) return { ...g, stopIds: [...g.stopIds, id] };
              return g;
            }));
          } else if (type === 'group') {
            setGroups(prev => {
              const arr = [...prev];
              const fi = arr.findIndex(g => g.id === id);
              const ti = arr.findIndex(g => g.id === hoveredGroup);
              const [item] = arr.splice(fi, 1);
              arr.splice(ti, 0, item);
              return arr;
            });
          }
        }
      }
      active = pending = null;
    }

    document.addEventListener('touchstart', onTouchStart, { passive:true });
    document.addEventListener('touchmove',  onTouchMove,  { passive:false });
    document.addEventListener('touchend',   onTouchEnd);
    document.addEventListener('touchcancel',onTouchEnd);
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchmove',  onTouchMove);
      document.removeEventListener('touchend',   onTouchEnd);
      document.removeEventListener('touchcancel',onTouchEnd);
    };
  }, []);

  // ── Desktop drag ──────────────────────────────────────────────────────────
  const desktopDrag = useRef(null);
  const [desktopOver, setDesktopOver] = useState(null);
  const stopGroupId = (stopId) => groups.find(g => g.stopIds.includes(stopId))?.id;

  function handleDesktopDrop(targetGroupId) {
    if (!desktopDrag.current) return;
    const { type, id, fromGroup } = desktopDrag.current;
    if (type === 'stop' && fromGroup !== targetGroupId) {
      setGroups(prev => prev.map(g => {
        if (g.id === fromGroup)     return { ...g, stopIds: g.stopIds.filter(sid => sid !== id) };
        if (g.id === targetGroupId) return { ...g, stopIds: [...g.stopIds, id] };
        return g;
      }));
    } else if (type === 'group' && id !== targetGroupId) {
      setGroups(prev => {
        const arr = [...prev];
        const fi = arr.findIndex(g => g.id === id);
        const ti = arr.findIndex(g => g.id === targetGroupId);
        const [item] = arr.splice(fi, 1);
        arr.splice(ti, 0, item);
        return arr;
      });
    }
    desktopDrag.current = null;
    setDesktopOver(null);
  }

  return html`
    <div style=${{ minHeight:"100vh", background:"linear-gradient(160deg,#060C18 0%,#091020 60%,#060C18 100%)", fontFamily:"'Barlow Condensed','Barlow',sans-serif", color:"#DEE6F5", maxWidth:"480px", margin:"0 auto", paddingTop:"env(safe-area-inset-top)", paddingBottom:"env(safe-area-inset-bottom)" }}>
      <div style=${{ background:"linear-gradient(135deg,#111E60 0%,#182888 100%)", padding:"26px 18px 20px", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
        <div style=${{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:"700", fontSize:"28px", color:"#FF7043", letterSpacing:"3px" }}>≈≈ GVB</div>
        <div style=${{ color:"#4A6080", fontSize:"12px", fontFamily:"'Barlow',sans-serif", marginTop:"2px", letterSpacing:"2px" }}>MY DEPARTURES</div>
      </div>

      <div style=${{ padding:"14px", display:"flex", flexDirection:"column", gap:"14px" }}>
        ${groups.map(group => {
          const isStopOver  = desktopOver?.groupId === group.id && desktopOver?.type === 'stop';
          const isGroupOver = desktopOver?.groupId === group.id && desktopOver?.type === 'group';
          return html`
            <div key=${group.id}
              onDragOver=${e => { e.preventDefault(); setDesktopOver({ groupId:group.id, type:desktopDrag.current?.type }); }}
              onDrop=${e => { e.preventDefault(); handleDesktopDrop(group.id); }}
              style=${{ outline: isStopOver ? "2px dashed rgba(99,179,237,0.6)" : isGroupOver ? "2px dashed rgba(255,112,67,0.6)" : "2px solid transparent", borderRadius:"16px", transition:"outline .15s" }}
            >
              <${GroupSection}
                group=${group}
                stops=${stops}
                nextDeps=${nextDeps}
                onRemoveStop=${handleRemoveStop}
                onEditStop=${stop => setModal({ mode:"edit", stop })}
                onNextDep=${handleNextDep}
                canRemove=${stops.length > 1}
              />
            </div>
          `;
        })}
      </div>

      <div style=${{ display:"none" }} onDragStart=${e => {
        const stopHandle  = e.target.closest('[data-drag-handle="stop"]');
        const groupHandle = e.target.closest('[data-drag-type="group"]');
        if (stopHandle) {
          const stopEl = stopHandle.closest('[data-drag-type="stop"]');
          desktopDrag.current = { type:'stop', id:stopEl.dataset.dragId, fromGroup: stopGroupId(stopEl.dataset.dragId) };
        }
        if (groupHandle) desktopDrag.current = { type:'group', id:groupHandle.closest('[data-group-id]')?.dataset.groupId };
      }}/>

      <div style=${{ padding:"0 14px 8px" }}>
        <button onClick=${() => setModal({ mode:"add" })}
          style=${{ display:"block", width:"100%", background:"rgba(255,112,67,.07)", border:"1px dashed rgba(255,112,67,.3)", borderRadius:"14px", color:"rgba(255,112,67,.8)", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:"700", fontSize:"17px", letterSpacing:"1.5px", padding:"16px", cursor:"pointer" }}>
          + ADD STOP
        </button>
      </div>

      <div style=${{ padding:"12px 18px 30px", color:"#1E3050", fontSize:"11px", fontFamily:"'Barlow',sans-serif", borderTop:"1px solid rgba(255,255,255,0.03)", marginTop:"6px" }}>
        Live data via OVapi · auto-refreshes every 30s
      </div>

      ${modal && html`
        <${StopModal}
          initial=${modal.mode==="edit" ? modal.stop : null}
          groups=${groups}
          onSave=${handleSave}
          onClose=${() => setModal(null)} />
      `}
    </div>
  `;
}

render(h(App, null), document.getElementById('root'));
</script>
</body>
</html>
